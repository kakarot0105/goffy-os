name: Bug report
description: Report a reproducible GOFFY OS defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private data, or security vulnerabilities.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, including the visible verification state?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe reproduction and relevant logs.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [Android, Hub, Protocol, MCP server, Documentation, CI]
    validations:
      required: true
