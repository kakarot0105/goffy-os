name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Hub and protocol
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Verify
        run: python scripts/verify_all.py --allow-missing-android

  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@4c125117fe7c5aed11272ec4213f602f012f89f2 # v5
      - name: Android preflight
        id: android_preflight
        run: python3 scripts/android_preflight.py
      - name: Lint, test, and assemble
        id: android_gradle
        run: ./android/gradlew -p android :app:lintDebug :app:testDebugUnitTest :app:assembleDebug :app:assembleRelease --no-daemon
      - name: Verify GOFFY LITE APK budget
        id: android_apk_budget
        run: python3 scripts/verify_android_apk_budget.py
      - name: Compile optional LiteRT-LM provider
        id: android_local_model_provider
        run: ./android/gradlew -p android :app:compileModelDebugKotlin --no-daemon
      - name: Verify merged Android manifests
        id: merged_manifest_security
        run: python3 scripts/security_scan.py --require-merged-manifests
      - name: Setup diagnostics on failure
        if: ${{ failure() && (steps.android_preflight.conclusion == 'failure' || steps.android_gradle.conclusion == 'failure' || steps.android_apk_budget.conclusion == 'failure' || steps.android_local_model_provider.conclusion == 'failure' || steps.merged_manifest_security.conclusion == 'failure') }}
        run: python3 scripts/setup_doctor.py --android-only --include-device --json
        continue-on-error: true
